name: Lint, Test, and Release Chart

on:
  push:
    branches: [ main ]
    paths:
      - 'charts/outline/**'
      - '.github/workflows/release.yml'
      - '.github/configs/**'
      - 'README.md'
      - 'LICENSE'

  pull_request:
    branches: [ main ]
    paths:
      - 'charts/outline/**'
      - '.github/workflows/release.yml'
      - '.github/configs/**'
      - 'README.md'
      - 'LICENSE'

env:
  HELM_VERSION: v3.18.3
  HELM_UNITTEST_VERSION: v0.8.2

jobs:
  lint-ah:
    runs-on: ubuntu-latest

    container:
      image: artifacthub/ah:latest
      options: --user root

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run Artifact Hub lint
        run: ah lint -p charts/outline

  lint-test:
    needs: lint-ah

    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: ${{ env.HELM_VERSION }}

      - uses: actions/setup-python@v6
        with:
          python-version: 3.12

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.8.0

      - name: Add dependency chart repos
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo add minio https://charts.min.io

      - name: Detect changed Outline chart or CI config
        id: list-changed
        run: |
          changed_chart=""
          changed_ci=""
          changed_files=""

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            changed_chart=$(ct --config ./.github/configs/ct-lint.yaml list-changed | grep '^charts/outline$' || true)
            changed_files=$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" || true)
          else
            base="${{ github.event.before }}"
            if [[ -z "$base" || "$base" == "0000000000000000000000000000000000000000" ]]; then
              changed_files=$(git diff-tree --no-commit-id --name-only -r "${{ github.sha }}" || true)
            else
              changed_files=$(git diff --name-only "$base" "${{ github.sha }}" || true)
            fi
            changed_chart=$(echo "$changed_files" | grep '^charts/outline/' || true)
          fi

          changed_ci=$(echo "$changed_files" | grep -E '^(\.github/workflows/release\.yml|\.github/configs/)' || true)

          echo "Changed files:"
          echo "$changed_files"

          if [[ -n "$changed_chart" || -n "$changed_ci" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "changed_charts=charts/outline" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Helm unittest plugin
        if: steps.list-changed.outputs.changed == 'true'
        run: |
          helm env
          helm plugin install https://github.com/helm-unittest/helm-unittest.git --version ${{ env.HELM_UNITTEST_VERSION }}

      - name: Run chart-testing (lint)
        if: steps.list-changed.outputs.changed == 'true'
        run: ct lint --debug --config ./.github/configs/ct-lint.yaml --lint-conf ./.github/configs/lintconf.yaml --charts charts/outline

      - name: Create kind cluster
        uses: helm/kind-action@v1.14.0
        if: steps.list-changed.outputs.changed == 'true'

      - name: Run chart-testing (install)
        if: steps.list-changed.outputs.changed == 'true'
        run: ct install --config ./.github/configs/ct-lint.yaml --charts charts/outline --helm-extra-set-args "--values charts/outline/values-kind.yaml" --helm-extra-args "--timeout 600s"

      - name: Post Chart Changes to Pull Request
        if: github.event_name == 'pull_request' && steps.list-changed.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          comment_body="### Chart Release Changes\n\n"
          chart="charts/outline"
          comment_body+="#### $chart changes\n\n"
          changes=$(yq eval '.annotations["artifacthub.io/changes"] | select(. != null)' "$chart/Chart.yaml" || echo "Failed to parse $chart/Chart.yaml")
          if [ -n "$changes" ] && [ "$changes" != "Failed to parse $chart/Chart.yaml" ]; then
            formatted_changes=$(echo "$changes" | yq eval -o=json | jq -r '.[] | "- **\(.kind | .[0:1] | ascii_upcase)\(.kind | .[1:])**: \(.description)\n  \(.links // [] | map("  - [\(.name)](\(.url))") | join("\n"))"')
            comment_body+="$formatted_changes\n\n"
          else
            comment_body+="No changes recorded for this release.\n\n"
          fi
          echo -e "$comment_body" > comment.md
          gh pr comment ${{ github.event.pull_request.number }} --body-file comment.md --edit-last --create-if-none || echo "Failed to post or edit comment"

  release:
    needs: lint-test

    runs-on: ubuntu-latest

    permissions:
      contents: write

    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Add dependency chart repos
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo add minio https://charts.min.io

      - name: Detect Outline chart changes
        id: detect-changed
        run: |
          base="${{ github.event.before }}"
          if [[ -z "$base" || "$base" == "0000000000000000000000000000000000000000" ]]; then
            changed=$(git diff-tree --no-commit-id --name-only -r "${{ github.sha }}" | grep '^charts/outline/' || true)
          else
            changed=$(git diff --name-only "$base" "${{ github.sha }}" | grep '^charts/outline/' || true)
          fi

          echo "Changed Outline chart files:"
          echo "$changed"

          if [[ -n "$changed" ]]; then
            echo "chart_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "chart_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract changes from Chart.yaml
        if: steps.detect-changed.outputs.chart_changed == 'true'
        run: |
          chart="charts/outline"
          echo "# Changelog" > "$chart/RELEASE-NOTES.md"
          echo "" >> "$chart/RELEASE-NOTES.md"
          changes=$(yq eval '.annotations["artifacthub.io/changes"] | select(. != null)' "$chart/Chart.yaml")
          if [ -n "$changes" ]; then
            echo "$changes" | yq eval -o=json | jq -r '.[] | "- **\(.kind | .[0:1] | ascii_upcase)\(.kind | .[1:])**: \(.description)\n  \(.links // [] | map("  - [\(.name)](\(.url))") | join("\n"))"' >> "$chart/RELEASE-NOTES.md"
          else
            echo "No changes recorded for this release." >> "$chart/RELEASE-NOTES.md"
          fi

      - name: Check chart signing secrets
        id: signing-secrets
        if: steps.detect-changed.outputs.chart_changed == 'true'
        run: |
          missing=()
          [[ -z "${{ secrets.CR_KEY }}" ]] && missing+=("CR_KEY")
          [[ -z "${{ secrets.GPG_KEYRING_BASE64 }}" ]] && missing+=("GPG_KEYRING_BASE64")
          [[ -z "${{ secrets.GPG_PASSPHRASE }}" ]] && missing+=("GPG_PASSPHRASE")

          if (( ${#missing[@]} > 0 )); then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping signed chart release because required signing secrets are missing: ${missing[*]}"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare GPG environment for Helm
        id: import-gpg
        if: steps.detect-changed.outputs.chart_changed == 'true' && steps.signing-secrets.outputs.configured == 'true'
        env:
          GPG_KEYRING_BASE64: ${{ secrets.GPG_KEYRING_BASE64 }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          GNUPG_DIR="$(mktemp --directory --tmpdir=${{ runner.temp }})"

          # Import GPG passphrase
          printf '%s' "$GPG_PASSPHRASE" > "${GNUPG_DIR}/passphrase"
          echo "passphrase-file=${GNUPG_DIR}/passphrase" >> "${GITHUB_OUTPUT}"

          # Import GPG signing key in the legacy keyring format expected by Helm/chart-releaser
          printf '%s' "$GPG_KEYRING_BASE64" | base64 -d > "${GNUPG_DIR}/secring.gpg"
          echo "keyring=${GNUPG_DIR}/secring.gpg" >> "${GITHUB_OUTPUT}"

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        if: steps.detect-changed.outputs.chart_changed == 'true' && steps.signing-secrets.outputs.configured == 'true'
        with:
          config: ./.github/configs/cr.yaml
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          CR_KEY: "${{ secrets.CR_KEY }}"
          CR_KEYRING: ${{ steps.import-gpg.outputs.keyring }}
          CR_PASSPHRASE_FILE: ${{ steps.import-gpg.outputs.passphrase-file }}
          CR_SIGN: "true"
          CR_SKIP_EXISTING: "true"

      - name: Skip release when no chart changes were detected
        if: steps.detect-changed.outputs.chart_changed != 'true'
        run: echo "No charts/outline changes detected; skipping chart release."

      - name: Skip release when signing secrets are not configured
        if: steps.detect-changed.outputs.chart_changed == 'true' && steps.signing-secrets.outputs.configured != 'true'
        run: echo "Signing secrets are not configured yet; skipping signed chart release."
